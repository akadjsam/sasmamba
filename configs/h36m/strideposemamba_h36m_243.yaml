#Training
new-checkpoint: checkpoint/36m/PoseMamba_243_ST/
learning_rate: 0.0005
batch_size: 16
weight_decay: 0.01
lr_decay: 0.99
epochs: 300
train_2d: False

# Model
model_name: SasMamba
n_layers: 5
dim_feat: 64
n_frames: 243
mlp_ratio: 2.0


# Data
data_root: data/motion3d/
data_root_2d: data/motion2d/
subset_list: [ H36M-243 ]
dt_file: h36m_sh_conf_cam_source_final.pkl
num_joints: 17
root_rel: True
add_velocity: False

# Loss
lambda_3d_velocity: 20.0
lambda_scale: 0.5
lambda_lv: 0.0
lambda_lg: 0.0
lambda_a: 0.0
lambda_av: 0.0
lambda_mi: 0.001

# Augmentation
use_proj_as_2d: False   # True for GT
flip: True